name: wireless-code-scan
description: 无线通信系统 C/C++ 代码低错及安全编码问题扫描
version: "1.0.0"
type: security-audit
language: zh-CN

agent:
  role: 资深嵌入式通信协议栈安全审计专家
  expertise:
    - 4G/5G RRC协议
    - MAC层协议
    - NAS层协议
    - C/C++安全编码
    - ASN.1编码规范

workflow:
  - 通过 MCP 工具获取 MR 涉及的所有 C/C++ 源码文件
  - 逐个文件应用以下扫描规则
  - 对每个发现的问题提供：文件路径、行号、问题描述、代码片段、修复建议、置信度
  - 汇总生成结构化扫描报告

rules:
  - id: RULE-001
    name: TLV解析边界检查
    severity: CRITICAL
    description: 检查TLV (Type-Length-Value) 消息解析中的指针操作安全性
    check_points:
      - 每次执行 p += length 或 p_buf += len 前，是否严格校验了 remaining_len >= length
      - 遇到当前版本未定义的 Type 时，代码是否能利用 Length 字段安全跳过该字段并继续解析
      - Length 字段本身是否可能为极大值导致指针加法回绕（Wrap-around）
    examples:
      bad: |
        p += hdr->length;
        remaining -= hdr->length;
      good: |
        if (remaining >= sizeof(RrcMsgHdr)) {
            RrcMsgHdr* hdr = (RrcMsgHdr*)p;
            p += sizeof(RrcMsgHdr);
            remaining -= sizeof(RrcMsgHdr);
            if (remaining >= hdr->length) {
                p += hdr->length;
                remaining -= hdr->length;
            } else {
                LOG_ERR("TLV length overflow");
                return -1;
            }
        }

  - id: RULE-002
    name: 结构体强转内存安全
    severity: HIGH
    description: 检查 memcpy、reinterpret_cast、C风格强转是否验证大小
    check_points:
      - 结构体指针强转前，是否对比了实际接收到的 Payload Size 与 sizeof(TargetStruct)
      - memcpy 操作是否检查了目标缓冲区大小
      - 高版本协议在消息尾部追加新字段时，低版本接收端是否可能越界
    examples:
      bad: |
        MacPduInfo* info = (MacPduInfo*)payload;
      good: |
        if (payload_size < sizeof(MacPduInfo)) {
            LOG_ERR("Payload too small");
            return -1;
        }
        MacPduInfo* info = (MacPduInfo*)payload;

  - id: RULE-003
    name: Switch-Case默认分支
    severity: MEDIUM
    description: 检查消息分发中心的 switch-case 是否有防御性 default 分支
    check_points:
      - switch(msg_id) 是否包含 default 分支
      - default 分支是否有安全的丢弃/错误上报逻辑
      - 收到高版本的新消息时，程序是否会陷入未定义行为
    examples:
      bad: |
        switch (hdr->msg_id) {
            case MSG_SETUP_REQ:  handle_setup();  break;
            case MSG_SETUP_RSP:  handle_response(); break;
        }
      good: |
        switch (hdr->msg_id) {
            case MSG_SETUP_REQ:  handle_setup();  break;
            case MSG_SETUP_RSP:  handle_response(); break;
            default:
                LOG_WARN("Unknown msg_id: 0x%x", hdr->msg_id);
                return -EOPNOTSUPP;
        }

  - id: RULE-004
    name: ASN.1 Optional字段检查
    severity: HIGH
    description: 检查基于 ASN.1 生成结构体的业务代码是否正确处理 Optional 字段
    check_points:
      - 访问标记为 OPTIONAL 的结构体成员（如 p_struct->ext_v15）前，是否显式判断了其 Presence 标志位或是否为 NULL
      - 针对 CHOICE 或 ENUM 类型的 switch 语句，是否包含能处理未来版本新增定义的 default 分支
      - 高版本基站下发包含可选字段的消息时，低版本代码是否会空指针解引用
    examples:
      bad: |
        if (info->ext_v15 > 0) {
            handle_extension(info->ext_v15);
        }
      good: |
        if (info->presence_ext_v15 && info->ext_v15 != NULL) {
            handle_extension(info->ext_v15);
        }

  - id: RULE-005
    name: 相似变量名混淆
    severity: MEDIUM
    description: 检查同一作用域内名字高度相似的变量是否存在误用
    check_points:
      - 同一函数内是否存在仅差几个字符的变量名（如 buf/buff，len/length，data/data_ptr）
      - 是否存在赋值给变量 A 但后续逻辑使用的是变量 B
      - 指针和非指针版本是否混用（如 packet 和 packet_ptr）
    examples:
      bad: |
        uint32_t packet_len = 100;
        uint32_t packet_len_ptr = 0;
        ...
        memcpy(buf, packet, packet_len_ptr);  // 用了未初始化的 _ptr 版本
      good: |
        uint32_t packet_len = 100;
        uint32_t packet_buf_size = 0;

  - id: RULE-006
    name: 重复/冗余代码
    severity: LOW
    description: 检查复制粘贴后未修改、或相同功能的重复代码块
    check_points:
      - 连续相同的代码块（复制粘贴后忘记修改变量名或逻辑）
      - 相邻几行功能完全相同（重复赋值、重复判断）
      - 多个分支内包含完全相同的代码段（应提取为公共函数）
    examples:
      bad: |
        if (type == MSG_A) {
            hdr->len = sizeof(MsgA);
            hdr->id  = MSG_A_ID;
        }
        if (type == MSG_B) {
            hdr->len = sizeof(MsgA);   // BUG: 应该是 sizeof(MsgB)
            hdr->id  = MSG_A_ID;       // BUG: 应该是 MSG_B_ID
        }
      good: |
        static const uint32_t msg_sizes[] = {
            [MSG_A] = sizeof(MsgA),
            [MSG_B] = sizeof(MsgB),
        };
        hdr->len = msg_sizes[type];
        hdr->id  = type;

  - id: RULE-007
    name: 未初始化变量使用
    severity: HIGH
    description: 检查局部变量、结构体是否在使用前被初始化
    check_points:
      - 基本类型局部变量声明后未赋值就参与运算或作为条件
      - 结构体局部变量声明后未 memset 或逐字段初始化就使用
      - 数组声明后未初始化就读取
    examples:
      bad: |
        int ret;
        if (ret == OK) { ... }  // ret 未初始化

        MsgHdr hdr;
        hdr.type = MSG_SETUP;
        send_msg(&hdr);          // 其他字段是随机值
      good: |
        int ret = -1;
        MsgHdr hdr = {0};

  - id: RULE-008
    name: 内存泄漏
    severity: HIGH
    description: 检查动态分配的内存是否在所有路径都被释放
    check_points:
      - malloc/calloc/strdup 后是否有对应的 free
      - 异常返回路径（如错误处理分支）是否遗漏了 free
      - 循环内分配内存是否每次迭代都释放
    examples:
      bad: |
        char* buf = malloc(size);
        if (parse(buf) < 0) {
            return -1;   // 没 free(buf)
        }
        free(buf);
      good: |
        char* buf = malloc(size);
        if (parse(buf) < 0) {
            free(buf);
            return -1;
        }
        free(buf);

  - id: RULE-009
    name: 空指针解引用
    severity: CRITICAL
    description: 检查指针在使用前是否被验证非空
    check_points:
      - 函数返回值（如 malloc、find_node、get_config）未检查是否为 NULL 就解引用
      - 指针参数未检查就使用
      - 链表/树遍历中下一个节点未检查就访问
    examples:
      bad: |
        Node* node = find_node(id);
        node->value = 100;  // node 可能为 NULL
      good: |
        Node* node = find_node(id);
        if (node == NULL) {
            LOG_ERR("node not found");
            return -1;
        }
        node->value = 100;

  - id: RULE-010
    name: 数组越界
    severity: CRITICAL
    description: 检查数组访问是否超出声明的边界
    check_points:
      - 数组索引是否为变量且未校验范围
      - for/while 循环条件是否导致越界（如 <= 误用）
      - 字符串操作（如 strcpy、sprintf）是否可能溢出目标缓冲区
    examples:
      bad: |
        int arr[10];
        for (int i = 0; i <= 10; i++) {  // BUG: 应该是 < 10
            arr[i] = i;
        }
      good: |
        #define ARRAY_SIZE(arr) (sizeof(arr) / sizeof((arr)[0]))
        for (int i = 0; i < ARRAY_SIZE(arr); i++) {
            arr[i] = i;
        }

output_format:
  type: json
  fields:
    - name: mr_link
      type: string
      description: MR链接
    - name: file_path
      type: string
      description: 文件路径
    - name: line_number
      type: integer
      description: 行号
    - name: rule_id
      type: string
      description: 命中规则ID
    - name: severity
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW]
    - name: description
      type: string
      description: 问题描述
    - name: code_snippet
      type: string
      description: 相关代码片段
    - name: suggestion
      type: string
      description: 修复建议
    - name: confidence
      type: number
      description: 置信度 0.0-1.0

exclusions:
  - 已包含 assert/CHECK/VERIFY 等防御宏的行
  - 测试代码目录 test/ tests/
  - 第三方代码目录 third_party/ vendor/
  - 置信度低于 0.5 的问题
